<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深海園林·粒子光影秀 Deep Sea Garden</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        canvas { display: block; }
        
        #video-container { display: none; }

        .glass-panel {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.5s ease;
        }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.3s; }
        
        @keyframes rgbRing {
            0% { border-color: #00ffff; box-shadow: 0 0 25px #00ffff, inset 0 0 10px #00ffff; }
            25% { border-color: #ff00ff; box-shadow: 0 0 35px #ff00ff, inset 0 0 15px #ff00ff; }
            50% { border-color: #ff9900; box-shadow: 0 0 25px #ff9900, inset 0 0 10px #ff9900; }
            75% { border-color: #00ff99; box-shadow: 0 0 35px #00ff99, inset 0 0 15px #00ff99; }
            100% { border-color: #00ffff; box-shadow: 0 0 25px #00ffff, inset 0 0 10px #00ffff; }
        }

        #hand-pointer {
            position: absolute;
            width: 70px; 
            height: 70px;
            border: 5px solid #fff; 
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            mix-blend-mode: normal; 
            background: rgba(255, 255, 255, 0.05);
            animation: rgbRing 3s linear infinite;
        }
        
        @keyframes textFlow {
            0% { background-position: 0% 50%; filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.4)); }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 45px rgba(232, 121, 249, 0.9)); }
            100% { background-position: 0% 50%; filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.4)); }
        }

        .model-name {
            font-size: 8rem;
            font-weight: 900;
            position: absolute;
            bottom: 5%;
            right: 5%;
            background: linear-gradient(270deg, #22d3ee, #e879f9, #ffffff, #22d3ee);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; 
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: opacity 1s;
            animation: textFlow 4s ease infinite; 
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="hand-pointer"></div>
    <div id="model-label" class="model-name">CORAL</div>

    <div id="ui-overlay" class="absolute top-8 left-8 z-20 pointer-events-none">
        <div class="glass-panel p-8 rounded-[2rem] flex flex-col gap-5 pointer-events-auto min-w-[300px]">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 to-blue-400">深海園林</h1>
                    <h2 class="text-lg font-bold text-blue-200 mt-1">粒子光影秀</h2>
                    <p class="text-xs font-bold tracking-[0.3em] uppercase text-white/90 mt-2">Particle Morphing</p>
                    <p class="text-[11px] font-medium tracking-[0.2em] text-cyan-300 mt-1 opacity-90">澳門科學館製作</p>
                </div>
                <span id="ai-status-dot" class="status-dot bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></span>
            </div>
            
            <div class="h-[1px] bg-white/20 w-full"></div>
            
            <div class="text-sm font-medium text-white/90 tracking-widest leading-loose">
                <div class="flex items-center gap-4 mb-3">
                    <div class="w-1.5 h-5 bg-cyan-400 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.5)]"></div>
                    <span>五指張開切換場景 🖐️</span>
                </div>
                <div class="flex items-center gap-4 mb-3">
                    <div class="w-1.5 h-5 bg-purple-400 rounded-full shadow-[0_0_10px_rgba(192,132,252,0.5)]"></div>
                    <span>移動拳頭旋轉視角 ✊</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-1.5 h-5 bg-pink-400 rounded-full shadow-[0_0_10px_rgba(244,114,182,0.5)]"></div>
                    <span>發出聲音放大目標 🎤</span>
                </div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="input_video" width="640" height="480" autoplay playsinline></video>
    </div>

    <script>
        const CONFIG = {
            particleCount: 50000, 
            baseSize: 0.12,
            transitionSpeed: 0.04
        };

        let scene, camera, renderer, particleSystem;
        let positions, colors, currentPositions, currentColors, targetPositions, targetColors;
        
        // Interaction State
        let handCenterX = 0.5, handCenterY = 0.5;
        let isHandVisible = false;
        let lastHandOpenState = false; 
        let currentModelIndex = 0; 
        let micVolume = 0; 

        // Audio Context
        let audioCtx;
        let bgGainNode;
        let micAnalyser;
        let micDataArray;
        let isAudioStarted = false;

        // Models Definition
        const MODELS = [
            { name: "CORAL", id: 0 },
            { name: "JELLYFISH", id: 1 },
            { name: "OCTOPUS", id: 2 },
            { name: "SCALLOP", id: 3 }, // Changed from CLAM
            { name: "SEAWEED", id: 4 },
            { name: "SUBMARINE", id: 5 },
            { name: "CLOWNFISH", id: 6 },
            { name: "MSC", id: 7 } 
        ];

        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 35); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Init Arrays
            positions = new Float32Array(CONFIG.particleCount * 3);
            colors = new Float32Array(CONFIG.particleCount * 3);
            
            // Buffers for morphing
            currentPositions = new Float32Array(CONFIG.particleCount * 3);
            targetPositions = new Float32Array(CONFIG.particleCount * 3);
            currentColors = new Float32Array(CONFIG.particleCount * 3);
            targetColors = new Float32Array(CONFIG.particleCount * 3);

            // Initialize with Coral
            generateTarget(0);
            
            // Set initial current to target
            for(let i=0; i<CONFIG.particleCount*3; i++) {
                currentPositions[i] = targetPositions[i];
                currentColors[i] = targetColors[i];
                positions[i] = (Math.random()-0.5)*50; 
                colors[i] = targetColors[i];
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: CONFIG.baseSize,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            
            window.addEventListener('resize', onWindowResize);
        }

        // --- Audio System (Generative + Mic) ---
        async function initAudio() {
            if (isAudioStarted) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // 1. Background Drone
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                lastOut = (lastOut + (0.02 * white)) / 1.02;
                data[i] = lastOut * 3.5; 
                lastOut *= 0.15; 
            }

            const noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 150; 

            bgGainNode = audioCtx.createGain();
            bgGainNode.gain.value = 0.8; 

            noiseNode.connect(filter);
            filter.connect(bgGainNode);
            bgGainNode.connect(audioCtx.destination);
            noiseNode.start();

            // 2. Microphone Input
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const micSource = audioCtx.createMediaStreamSource(stream);
                micAnalyser = audioCtx.createAnalyser();
                micAnalyser.fftSize = 64; 
                micAnalyser.smoothingTimeConstant = 0.7; // Lower smoothing for faster reaction
                micSource.connect(micAnalyser);
                micDataArray = new Uint8Array(micAnalyser.frequencyBinCount);
            } catch (err) {
                console.warn("Microphone access denied or error:", err);
            }

            isAudioStarted = true;
            console.log("Audio Engine Started");
        }

        function playSwitchSound() {
            if (!audioCtx) {
                initAudio();
                return;
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            const now = audioCtx.currentTime;
            
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

            osc.start(now);
            osc.stop(now + 0.6);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(800, now);
            osc2.frequency.linearRampToValueAtTime(1600, now + 0.4);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.1, now + 0.1);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc2.start(now);
            osc2.stop(now + 0.4);
        }

        // --- Math Helpers ---
        function sphere(u, v, r) {
            return [r * Math.sin(u) * Math.cos(v), r * Math.sin(u) * Math.sin(v), r * Math.cos(u)];
        }
        
        function lerpColor(c1, c2, t) {
            return {
                r: c1.r + (c2.r - c1.r) * t,
                g: c1.g + (c2.g - c1.g) * t,
                b: c1.b + (c2.b - c1.b) * t
            };
        }

        // --- Model Generation Logic ---
        function generateTarget(modelId) {
            let idx = 0;
            const setP = (x, y, z, r, g, b) => {
                if(idx >= CONFIG.particleCount) return;
                targetPositions[idx*3] = x; targetPositions[idx*3+1] = y; targetPositions[idx*3+2] = z;
                targetColors[idx*3] = r; targetColors[idx*3+1] = g; targetColors[idx*3+2] = b;
                idx++;
            };

            const C_PINK = {r:1, g:0.4, b:0.7};
            const C_ORANGE = {r:1, g:0.6, b:0.2};
            const C_CYAN = {r:0, g:1, b:1};
            const C_BLUE = {r:0.1, g:0.2, b:0.9};
            const C_GREEN = {r:0.2, g:0.9, b:0.4};
            const C_PURPLE = {r:0.6, g:0, b:1};
            const C_RED = {r:0.9, g:0.1, b:0.1};
            const C_YELLOW = {r:1, g:0.9, b:0.2};
            const C_WHITE = {r:0.9, g:0.9, b:0.9};
            const C_BLACK = {r:0.1, g:0.1, b:0.1};
            const C_NEMO_ORANGE = {r:1.0, g:0.4, b:0.05};
            const C_NEMO_WHITE = {r:0.95, g:0.95, b:0.95};
            const C_NEMO_BLACK = {r:0.15, g:0.15, b:0.15};
            const C_SCALLOP_SHELL = {r:0.95, g:0.85, b:0.75}; // Cream/Beige
            const C_SCALLOP_ORANGE = {r:1.0, g:0.6, b:0.4}; // Orange accent
            const C_MSC_RED = {r:1.0, g:0.0, b:0.2}; 
            const C_MSC_WHITE = {r:1.0, g:1.0, b:1.0};

            if (modelId === 0) { 
                // CORAL
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    if(r < 0.2) { 
                        const theta = Math.random()*Math.PI*2;
                        const rad = Math.random()*6;
                        const y = (Math.random()-0.5)*2 - 5;
                        const c = lerpColor(C_ORANGE, C_PINK, Math.random()*0.3);
                        setP(Math.cos(theta)*rad, y, Math.sin(theta)*rad, c.r, c.g, c.b);
                    } else { 
                        const branchId = Math.floor(Math.random()*15);
                        const h = Math.random();
                        const theta = branchId * (Math.PI*2/15) + h*0.5;
                        const rad = 2 + h * 4 + Math.sin(h*20)*0.2;
                        const x = Math.cos(theta)*rad;
                        const z = Math.sin(theta)*rad;
                        const y = -4 + h * 12 + Math.cos(h*10)*0.5;
                        const c = lerpColor(C_ORANGE, C_PINK, h);
                        setP(x + (Math.random()-0.5)*0.3, y, z + (Math.random()-0.5)*0.3, c.r, c.g, c.b);
                    }
                }
            }
            else if (modelId === 1) {
                // JELLYFISH
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    if(r < 0.4) { 
                        const u = Math.random()*Math.PI*2;
                        const v = Math.random()*Math.PI*0.4;
                        const rad = 7;
                        const pt = sphere(v, u, rad);
                        const c = lerpColor(C_CYAN, C_BLUE, v/Math.PI);
                        setP(pt[1], pt[2] + 2, pt[0], c.r, c.g, c.b);
                    } else { 
                        const angle = Math.random()*Math.PI*2;
                        const rad = Math.random()*5;
                        const depth = Math.random()*12;
                        const x = Math.cos(angle)*rad;
                        const z = Math.sin(angle)*rad;
                        const y = 2 - depth;
                        const c = lerpColor(C_BLUE, C_PURPLE, depth/12);
                        setP(x, y + Math.sin(depth)*0.5, z, c.r, c.g, c.b);
                    }
                }
            }
            else if (modelId === 2) {
                // OCTOPUS
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    if(r < 0.25) { 
                        const u = Math.random()*Math.PI;
                        const v = Math.random()*Math.PI*2;
                        const rad = 4.5;
                        const pt = sphere(u, v, rad);
                        const y = pt[2] * 1.2 + 4;
                        const c = lerpColor(C_RED, C_PURPLE, Math.abs(pt[1])/rad);
                        setP(pt[0], y, pt[1], c.r, c.g, c.b);
                    } else { 
                        const arm = Math.floor(Math.random()*8);
                        const t = Math.random(); 
                        const angle = arm * (Math.PI/4);
                        const spread = t * 10;
                        const spiral = t * 2;
                        const x = Math.cos(angle + spiral) * spread;
                        const z = Math.sin(angle + spiral) * spread;
                        const y = 4 - t * 8 + Math.sin(t*10)*1.0;
                        const c = lerpColor(C_PURPLE, C_ORANGE, t);
                        setP(x + (Math.random()-0.5), y, z + (Math.random()-0.5), c.r, c.g, c.b);
                    }
                }
            }
            else if (modelId === 3) {
                // SCALLOP (扇貝)
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    // Fan shape: 0 to PI
                    const u = Math.random(); // Angle normalized
                    const v = Math.random(); // Radius normalized
                    
                    const theta = u * Math.PI; // 0 to 180 deg
                    const radius = Math.pow(v, 0.5) * 5.5; // Sqrt distribution
                    
                    // Scallop ribs (Ridges)
                    // High frequency sine wave on depth (z)
                    const ribFreq = 20.0;
                    const ribDepth = 0.3 * (radius / 5.5); // Ribs deeper at edge
                    const ribZ = Math.sin(theta * ribFreq) * ribDepth;
                    
                    // Base shape is flat fan, slightly curved
                    let x = radius * Math.cos(theta);
                    let y = radius * Math.sin(theta);
                    let z = ribZ + Math.sin(v * Math.PI)*1.5; // General convexity
                    
                    // Add "Ears" (Auricles) at the hinge (near radius 0)
                    // Hinge is at y=0, x=0 approx. Actually fan is centered.
                    // Let's adjust coordinate system: Hinge at (0,0), fan goes up (+y)
                    
                    // Add thickness (Double shell)
                    const isTop = r > 0.5;
                    const side = isTop ? 1 : -1;
                    
                    // Rotate slightly open
                    const openAngle = 0.3;
                    const z_final = z * side;
                    
                    // Rotate shells
                    const yt = y * Math.cos(openAngle * side) - z_final * Math.sin(openAngle * side);
                    const zt = y * Math.sin(openAngle * side) + z_final * Math.cos(openAngle * side);
                    
                    // Color gradient: Cream center to Orange edge
                    let c = lerpColor(C_SCALLOP_SHELL, C_SCALLOP_ORANGE, Math.pow(v, 2));
                    // Darker ribs
                    if (ribZ < 0) {
                        c = {r: c.r*0.8, g: c.g*0.8, b: c.b*0.8};
                    }

                    setP(x, yt - 2, zt, c.r, c.g, c.b); // Center vertical
                }
            }
            else if (modelId === 4) {
                // SEAWEED
                while(idx < CONFIG.particleCount) {
                    const strand = Math.floor(Math.random()*20);
                    const h = Math.random();
                    const groupX = (strand % 5 - 2) * 3;
                    const groupZ = (Math.floor(strand/5) - 2) * 3;
                    const height = 15;
                    const wave = Math.sin(h * 10 + strand);
                    const x = groupX + wave * 0.5 + (Math.random()-0.5)*0.2;
                    const z = groupZ + (Math.random()-0.5)*0.2;
                    const y = -8 + h * height;
                    const c = lerpColor(C_GREEN, C_CYAN, h);
                    setP(x, y, z, c.r, c.g, c.b);
                }
            }
            else if (modelId === 5) {
                // SUBMARINE
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    if (r < 0.7) { 
                        const u = Math.random()*Math.PI;
                        const v = Math.random()*Math.PI*2;
                        const pt = sphere(u, v, 1);
                        const x = pt[0] * 7;
                        const y = pt[1] * 2.5;
                        const z = pt[2] * 2.5;
                        const c = lerpColor(C_YELLOW, C_ORANGE, 0.2);
                        setP(x, y, z, c.r, c.g, c.b);
                    } else if (r < 0.85) { 
                        const h = Math.random();
                        const theta = Math.random()*Math.PI*2;
                        const rad = 1.2;
                        const x = Math.cos(theta)*rad + 1; 
                        const z = Math.sin(theta)*rad;
                        const y = 2 + h * 2;
                        setP(x, y, z, C_ORANGE.r, C_ORANGE.g, C_ORANGE.b);
                    } else { 
                        const theta = Math.random()*Math.PI*2;
                        const rad = Math.random()*2.5;
                        const x = -7.5; 
                        const y = Math.cos(theta)*rad;
                        const z = Math.sin(theta)*rad;
                        setP(x, y, z, C_WHITE.r, C_WHITE.g, C_WHITE.b);
                    }
                }
            }
            else if (modelId === 6) {
                // CLOWNFISH
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    if (r < 0.75) { 
                        const u = Math.random() * Math.PI;
                        const v = Math.random() * Math.PI * 2;
                        const pt = sphere(u, v, 1);
                        const x = pt[0] * 5.5;   
                        const y = pt[1] * 3.0;   
                        const z = pt[2] * 1.8;   
                        let color = C_NEMO_ORANGE;
                        const checkX = x + (Math.random()-0.5)*0.3;
                        const stripeWidth = 0.7;
                        if (Math.abs(checkX - 2.8) < stripeWidth || 
                            Math.abs(checkX + 0.8) < stripeWidth || 
                            Math.abs(checkX + 3.8) < stripeWidth * 0.7) {
                            color = C_NEMO_WHITE;
                            if (Math.abs(checkX - 2.8) > stripeWidth*0.8 || 
                                Math.abs(checkX + 0.8) > stripeWidth*0.8 || 
                                Math.abs(checkX + 3.8) > stripeWidth*0.5) {
                                color = C_NEMO_BLACK;
                            }
                        }
                        setP(x, y, z, color.r, color.g, color.b);
                    } else if (r < 0.85) { 
                        const angle = (Math.random()-0.5) * 1.8; 
                        const len = 2 + Math.random() * 2;
                        const x = -5.0 - len * Math.cos(angle); 
                        const y = len * Math.sin(angle) * 1.2;
                        const z = (Math.random()-0.5) * 0.4;
                        let c = C_NEMO_ORANGE;
                        if (Math.random() > 0.7) c = C_NEMO_BLACK;
                        setP(x, y, z, c.r, c.g, c.b);
                    } else if (r < 0.92) { 
                        const t = Math.random(); 
                        const x = 1.5 - t * 4.5; 
                        const y = 2.5 + Math.sin(t * Math.PI) * 2.5;
                        const z = (Math.random()-0.5) * 0.3;
                        let c = C_NEMO_ORANGE;
                        if(y > 4.2) c = C_NEMO_BLACK; 
                        setP(x, y, z, c.r, c.g, c.b);
                    } else if (r < 0.98) { 
                        const side = Math.random() > 0.5 ? 1 : -1;
                        const t = Math.random();
                        const x = 2.0 - t * 2.0;
                        const y = -1.5 - t * 1.2;
                        const z = side * (1.6 + t * 2.2);
                        let c = C_NEMO_ORANGE;
                        if(t > 0.85) c = C_NEMO_BLACK;
                        setP(x, y, z, c.r, c.g, c.b);
                    } else { 
                        const side = Math.random() > 0.5 ? 1 : -1;
                        const x = 3.8;
                        const y = 0.8;
                        const z = side * 1.0;
                        setP(x + (Math.random()-0.5)*0.3, y + (Math.random()-0.5)*0.3, z + (Math.random()-0.5)*0.3, 1, 1, 1); 
                        if(Math.random()<0.4) setP(x+0.2, y, z*1.1, 0, 0, 0); 
                    }
                }
            }
            else if (modelId === 7) {
                // MSC Calligraphy Style (Connected strokes)
                while(idx < CONFIG.particleCount) {
                    const r = Math.random();
                    // Define strokes as Bezier curves or path functions
                    // M: 3 flow strokes
                    // S: 1 continuous sigmoid
                    // C: 1 arc
                    
                    let x, y, z;
                    const brushSize = 0.3; // Random scatter around path
                    
                    // Function to interpolate path
                    const getPathPoint = (p0, p1, p2, t) => {
                        // Quadratic Bezier
                        const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x;
                        const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y;
                        const z = (1-t)*(1-t)*p0.z + 2*(1-t)*t*p1.z + t*t*p2.z;
                        return {x, y, z};
                    };

                    if (r < 0.4) { // M
                        // 3 strokes to form M in calligraphy
                        // Stroke 1: Left vertical-ish (Top-left to Bottom-left)
                        // Stroke 2: Arch 1 (Bottom-left to Top-mid to Bottom-mid)
                        // Stroke 3: Arch 2 (Bottom-mid to Top-right to Bottom-right)
                        const seg = Math.random();
                        const t = Math.random();
                        let p;
                        
                        if(seg < 0.3) { // Stroke 1
                             p = getPathPoint(
                                 {x:-7, y:4, z:0}, 
                                 {x:-7.5, y:0, z:1}, 
                                 {x:-7, y:-4, z:0}, t);
                        } else if(seg < 0.65) { // Arch 1
                             p = getPathPoint(
                                 {x:-7, y:2, z:0}, 
                                 {x:-5, y:5, z:2}, 
                                 {x:-4, y:-4, z:0}, t);
                        } else { // Arch 2
                             p = getPathPoint(
                                 {x:-4, y:2, z:0}, 
                                 {x:-2, y:5, z:2}, 
                                 {x:-1, y:-4, z:1}, t);
                        }
                        x = p.x; y = p.y; z = p.z;
                    } else if (r < 0.7) { // S
                        // Continuous flow S
                        // Top curve -> Middle -> Bottom curve
                        const t = Math.random();
                        // 2 Beziers connected
                        let p;
                        if(t < 0.5) { // Top half
                            const tt = t * 2;
                             p = getPathPoint(
                                {x:3, y:3, z:1}, // Top right start
                                {x:0, y:5, z:2}, // Top peak
                                {x:1.5, y:0, z:0}, tt); // Middle
                        } else { // Bottom half
                            const tt = (t - 0.5) * 2;
                             p = getPathPoint(
                                {x:1.5, y:0, z:0}, // Middle
                                {x:3, y:-5, z:-1}, // Bottom valley
                                {x:0, y:-3, z:1}, tt); // Bottom left end
                        }
                        x = p.x; y = p.y; z = p.z;
                    } else { // C
                        // Big Arc C
                        const t = Math.random();
                        let p = getPathPoint(
                            {x:7, y:3, z:2}, // Top right
                            {x:2, y:0, z:-1}, // Far left back
                            {x:7, y:-3, z:2}, t); // Bottom right
                        x = p.x; y = p.y; z = p.z;
                    }

                    // Add "Ink Splatter" / Brush volume
                    // Density is higher in center of stroke
                    const scatter = Math.pow(Math.random(), 2) * brushSize * 2.5; 
                    const angle = Math.random() * Math.PI * 2;
                    x += Math.cos(angle) * scatter;
                    y += Math.sin(angle) * scatter;
                    z += (Math.random()-0.5) * 0.5;

                    let c = C_MSC_WHITE;
                    if (Math.random() < 0.3) c = C_MSC_RED;
                    setP(x, y, z, c.r, c.g, c.b);
                }
            }
        }

        function switchModel() {
            // Audio check
            if (!audioCtx) initAudio(); 
            playSwitchSound();

            currentModelIndex = (currentModelIndex + 1) % MODELS.length;
            generateTarget(currentModelIndex);
            
            const label = document.getElementById('model-label');
            label.style.opacity = 0;
            setTimeout(() => {
                label.innerText = MODELS[currentModelIndex].name;
                label.style.opacity = 1.0; 
            }, 500);
        }

        // --- Update Loop ---
        function updateParticles() {
            const time = performance.now() * 0.001;
            
            // Microphone Data Process
            let scaleMultiplier = 1.0;
            if (micAnalyser && isAudioStarted) {
                micAnalyser.getByteFrequencyData(micDataArray);
                let sum = 0;
                for(let i=0; i<micDataArray.length; i++) sum += micDataArray[i];
                const avg = sum / micDataArray.length;
                micVolume = avg;
                
                // RESTORED INITIAL SENSITIVITY
                // Threshold 10, Multiplier 1.0 (approx)
                if (micVolume > 10) {
                     const boost = (micVolume - 10) / 100; // Original formula
                     scaleMultiplier = 1.0 + Math.min(boost, 0.8); // Gentle boost max 1.8x
                }
            }

            const targetRotX = (handCenterY - 0.5) * 2.5; 
            const targetRotY = (handCenterX - 0.5) * 2.5; 
            
            particleSystem.rotation.x += (targetRotX - particleSystem.rotation.x) * 0.1;
            particleSystem.rotation.y += (targetRotY - particleSystem.rotation.y) * 0.1;

            const targetScale = scaleMultiplier;
            particleSystem.scale.setScalar(
                THREE.MathUtils.lerp(particleSystem.scale.x, targetScale, 0.2)
            );

            const posArr = particleSystem.geometry.attributes.position.array;
            const colArr = particleSystem.geometry.attributes.color.array;

            // Morphing
            for(let i=0; i<CONFIG.particleCount; i++) {
                const i3 = i*3;
                
                const noiseX = Math.sin(time*2 + i)*0.02;
                const noiseY = Math.cos(time*1.5 + i)*0.02;
                
                currentPositions[i3] += (targetPositions[i3] - currentPositions[i3]) * CONFIG.transitionSpeed + noiseX;
                currentPositions[i3+1] += (targetPositions[i3+1] - currentPositions[i3+1]) * CONFIG.transitionSpeed + noiseY;
                currentPositions[i3+2] += (targetPositions[i3+2] - currentPositions[i3+2]) * CONFIG.transitionSpeed;

                posArr[i3] = currentPositions[i3];
                posArr[i3+1] = currentPositions[i3+1];
                posArr[i3+2] = currentPositions[i3+2];

                currentColors[i3] += (targetColors[i3] - currentColors[i3]) * CONFIG.transitionSpeed * 0.5; 
                currentColors[i3+1] += (targetColors[i3+1] - currentColors[i3+1]) * CONFIG.transitionSpeed * 0.5;
                currentColors[i3+2] += (targetColors[i3+2] - currentColors[i3+2]) * CONFIG.transitionSpeed * 0.5;

                colArr[i3] = currentColors[i3];
                colArr[i3+1] = currentColors[i3+1];
                colArr[i3+2] = currentColors[i3+2];
            }

            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.geometry.attributes.color.needsUpdate = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function initAI() {
            const videoElement = document.getElementById('input_video');
            const statusDot = document.getElementById('ai-status-dot');
            const pointer = document.getElementById('hand-pointer');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandVisible = true;
                    statusDot.className = 'status-dot bg-cyan-400 shadow-[0_0_15px_rgba(0,255,255,1)]';
                    pointer.style.display = 'block';

                    const landmarks = results.multiHandLandmarks[0];
                    const middle = landmarks[9];
                    handCenterX = middle.x;
                    handCenterY = middle.y;

                    const thumb = landmarks[4], pinky = landmarks[20];
                    const dist = Math.sqrt(Math.pow(thumb.x - pinky.x, 2) + Math.pow(thumb.y - pinky.y, 2));
                    const isHandOpen = dist > 0.35; 

                    if (isHandOpen && !lastHandOpenState) {
                        switchModel();
                        pointer.style.transform = 'translate(-50%, -50%) scale(1.5)';
                        pointer.style.borderColor = '#fff';
                        setTimeout(() => {
                             pointer.style.transform = 'translate(-50%, -50%) scale(1.0)';
                             pointer.style.borderColor = 'rgba(255, 255, 255, 0.9)';
                        }, 200);
                    }
                    lastHandOpenState = isHandOpen;

                    pointer.style.left = (1 - handCenterX) * 100 + '%';
                    pointer.style.top = handCenterY * 100 + '%';
                    
                } else {
                    isHandVisible = false;
                    statusDot.className = 'status-dot bg-red-600';
                    pointer.style.display = 'none';
                    lastHandOpenState = false; 
                }
            });

            const cameraPipe = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
            cameraPipe.start();
        }

        window.onload = () => { 
            initThree(); initAI(); 
            (function animate() { 
                requestAnimationFrame(animate); 
                updateParticles(); 
                renderer.render(scene, camera); 
            })(); 
        };
    </script>
